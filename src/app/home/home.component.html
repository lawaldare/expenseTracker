<main>
  <h1 class="underline">Sign In</h1>

  <div class="container">
    <form [formRoot]="loginForm">
      <div class="form-control">
        <label for="text">Email<sup>*</sup></label>
        <input
          type="email"
          [formField]="loginForm.email"
          placeholder="Enter your email..."
        />
      </div>
      <div class="form-control">
        <label for="text">Password<sup>*</sup></label>
        <input
          type="password"
          [formField]="loginForm.password"
          placeholder="Enter your password..."
        />
      </div>
      <button class="btn" [disabled]="loginForm().invalid()">Sign In</button>
    </form>
    <p class="footer">
      Don't have an account? <span routerLink="/register">Sign up</span>
    </p>
  </div>
</main>
