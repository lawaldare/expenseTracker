<main>
  <header>
    <h3>Add new transaction</h3>
    <i class="ph ph-x" (click)="dialogRef.close()"></i>
  </header>
  <form #transactionForm="ngForm" (ngSubmit)="onSubmit(transactionForm)">
    <div class="form-control">
      <label for="text">Text</label>
      <input
        type="text"
        #text="ngModel"
        ngModel
        name="text"
        placeholder="Enter text..."
        required
      />
    </div>
    <div class="form-control">
      <label for="amount" class="label-amount">Amount</label>
      <div class="radio-container">
        <div class="radio">
          <input
            type="radio"
            id="bills"
            name="category"
            value="bills"
            [ngModel]="category"
          />
          <label for="bills">Bills</label>
        </div>
        <div class="radio">
          <input
            type="radio"
            id="expenses"
            name="category"
            value="expenses"
            [ngModel]="category"
          />
          <label for="expenses">Expenses</label>
        </div>
        <div class="radio">
          <input
            type="radio"
            id="investments"
            name="category"
            value="investments"
            [ngModel]="category"
          />
          <label for="investments">Investments</label>
        </div>

        <div class="radio">
          <input
            type="radio"
            id="income"
            name="category"
            value="income"
            [ngModel]="category"
          />
          <label for="income">Income</label>
        </div>
      </div>
      <!-- <select #category="ngModel" ngModel name="category">
      <option value="-">Expense</option>
      <option value="+">Income</option>
    </select> -->
      <input
        type="number"
        #amount="ngModel"
        ngModel
        name="amount"
        placeholder="Enter amount..."
        required
      />
    </div>
    <button class="btn" [disabled]="transactionForm.invalid">
      Add transaction
    </button>
  </form>
</main>
